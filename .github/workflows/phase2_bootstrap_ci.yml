name: phase2-bootstrap-ci

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  smoke-and-fallback-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure upstream Neuraxon source is present
        run: |
          if [ ! -f upstream/Neuraxon/neuraxon.py ]; then
            mkdir -p upstream
            git clone --depth 1 https://github.com/DavidVivancos/Neuraxon.git upstream/Neuraxon
          fi

      - name: Smoke v1/v2
        run: python3 scripts/smoke_v1_v2.py

      - name: Run upstream fallback tests (no pytest install required)
        run: python3 scripts/run_upstream_tests_no_pytest.py
