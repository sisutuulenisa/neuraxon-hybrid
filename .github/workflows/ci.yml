name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src tests examples

      - name: Check imports
        run: |
          python -c "import neuraxon_agent"
          python -c "from neuraxon_agent import Tissue, Perception, Action, Modulation, Memory, Evolution"

      - name: Type check with mypy
        run: mypy src

      - name: Run example script
        run: python examples/basic_agent_loop.py
